name: Auto-Update StackMarket
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write  # This is the key: it allows the bot to write/save files

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Update Script
        run: |
          pip install requests
          python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "StackMarket Bot"
          git config --global user.email "bot@stackmarket.com"
          git add data.json
          git commit -m "Automated update of product data"
          git push
