<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StackMarket | Tech Essentials</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 4px; }
        .btn { display: block; background: #007bff; color: white; padding: 10px; text-align: center; text-decoration: none; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>StackMarket</h1>
    <div class="grid" id="product-container">
        </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('product-container');
                data.forEach(product => {
                    container.innerHTML += `
                        <div class="card">
                            <img src="${product.image}" alt="${product.title}">
                            <h3>${product.title}</h3>
                            <p>${product.description}</p>
                            <p><strong>${product.price}</strong></p>
                            <a href="${product.affiliate_link}" class="btn" rel="nofollow">View Deal</a>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
